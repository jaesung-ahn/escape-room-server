spring:
  profiles:
    active: local
server:
  port: 3781

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-ms: 7200000  # 2 hours
  refresh-token-expiration-ms: 172800000  # 2 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
